<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
    // 权限检查：只判断会话登录，刷新就失效
    if (sessionStorage.getItem("isLogin") !== "true") {
        alert("请先登录后再访问该页面！");
        location.href = "login.html";
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事务日程管理 - 学生事务时间管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        
        /* 全局背景图 */
        body { 
            background: url('images/task.jpeg') center top / cover no-repeat fixed; 
            background-color: #f5f7fa; 
        }

        /* 导航栏 */
        .nav-bar { width: 100%; height: 70px; background-color: #165DFF; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); position: fixed; top: 0; left: 0; z-index: 999; }
        .nav-bar .logo { font-size: 22px; color: #fff; font-weight: bold; }
        .nav-menu a { color: #fff; text-decoration: none; font-size: 16px; margin: 0 12px; padding: 8px 10px; border-radius: 5px; transition: all 0.3s; }
        .nav-menu a:hover { background: rgba(255,255,255,0.2); }
        .nav-menu a.active { background: rgba(255,255,255,0.25); }

        .wrap { margin-top: 120px; width: 1000px; margin-left: auto; margin-right: auto; background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .page-title { font-size: 26px; color: #333; margin-bottom: 20px; padding-left: 10px; border-left: 5px solid #165DFF; }

        /* ✅ 仪表盘样式 */
        .dashboard { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; text-align: center; }
        .stat-value { font-size: 26px; font-weight: bold; color: #165DFF; margin-bottom: 5px; }
        .stat-label { font-size: 13px; color: #86909C; }
        .progress-container { width: 100%; height: 10px; background: #f2f3f5; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #165DFF, #00d2ff); width: 0%; transition: width 0.5s ease; }

        /* 添加表单 */
        .add-task { background: #fff; padding: 25px 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 30px; }
        .add-task h3 { color: #165DFF; margin-bottom: 20px; font-size: 18px; }
        .task-form { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .task-form input, .task-form select { padding: 12px; border: 1px solid #e0e6ed; border-radius: 8px; font-size: 15px; outline-color: #165DFF; }
        .task-form input[type="text"] { flex: 1; min-width: 300px; }
        .task-form button { padding: 12px 25px; background: #165DFF; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .task-form button:hover { background: #0b4cde; }

        /* 任务列表卡片 */
        .task-list { margin-top: 30px; }
        .task-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; transition: transform 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .task-card:hover { transform: translateY(-3px); }
        
        /* 优先级边框色 */
        .task-high { border-left: 6px solid #f53f3f; }
        .task-medium { border-left: 6px solid #ff9800; }
        .task-low { border-left: 6px solid #34a853; }

        
        /* 倒计时与逾期样式 */
        .task-info h4 { color: #333; margin-bottom: 4px; transition: 0.3s; }
        .task-time { color: #999; font-size: 13px; }
        .task-countdown { font-size: 13px; color: #165DFF; margin-top: 6px; font-weight: bold; }
        .task-countdown.overdue { color: #f53f3f; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 完成状态效果 */
        .task-card.completed { opacity: 0.6; background: #f9f9f9; border-left-color: #ccc; }
        .task-card.completed h4 { text-decoration: line-through; color: #999; }

        /* 操作区域 */
        .task-right { display: flex; align-items: center; gap: 15px; }
        .task-priority { padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #fff; }
        .priority-high { background: #f53f3f; }
        .priority-medium { background: #ff9800; }
        .priority-low { background: #34a853; }

        .btn-delete { background: #ff4d4f; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background: #d9363e; }
        
        .finish-check { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="logo">学生事务时间管理系统</div>
    <div class="nav-menu">
        <a href="new.html">首页</a>
        <a href="task.html" class="active">事务日程管理</a>
        <a href="study.html">学习规划安排</a>
        <a href="help.html">使用帮助</a>
        <a href="login.html">登录</a>
        <a href="register.html">注册</a>
        <a href="javascript:logout()" style="color:#ff4444; font-weight:bold;">退出登录</a>
    </div>
</div>

<div class="wrap">
    <h2 class="page-title">我的事务日程管理</h2>

    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-value" id="totalTasks">0</div>
            <div class="stat-label">待办总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="highPriorityCount">0</div>
            <div class="stat-label">高优先级</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="overdueCount" style="color: #f53f3f;">0</div>
            <div class="stat-label">已逾期</div>
        </div>
        <div class="stat-card" style="flex: 1.5;">
            <div class="stat-label">任务完成进度</div>
            <div class="progress-container">
                <div class="progress-bar" id="completionBar"></div>
            </div>
            <div class="stat-label" id="completionText" style="margin-top: 5px; font-weight: bold;">0%</div>
        </div>
    </div>

    <div class="add-task">
        <h3>添加新事务</h3>
        <form class="task-form" id="taskForm">
            <input type="text" id="taskInput" placeholder="请输入事务内容（如：准备英语演讲）" required>
            <input type="datetime-local" id="timeInput" required>
            <select id="prioritySelect" required>
                <option value="">优先级</option>
                <option value="high">高优先级</option>
                <option value="medium">中优先级</option>
                <option value="low">低优先级</option>
            </select>
            <button type="button" onclick="addTask()">确认添加</button>
        </form>
    </div>

   <div class="task-list" id="taskList"></div>
</div>

<script>
    const username = localStorage.getItem("saveUser");
    let currentTasks = []; // 用于存储当前拉取的任务数据

    // 1. 页面初始化
    window.onload = async function() {
        if (!username) return;
        await refreshTaskList();
        setInterval(updateAllCountdowns, 60000);
    };

    // ✅ 核心：更新仪表盘数据
    function updateDashboard() {
        const total = currentTasks.length;
        let highCount = 0;
        let overdueCount = 0;
        const now = new Date();

        currentTasks.forEach(t => {
            if (t.priority === 'high') highCount++;
            if (new Date(t.task_time) < now) overdueCount++;
        });

        const completedCount = document.querySelectorAll('.task-card.completed').length;
        const progress = total === 0 ? 0 : Math.round((completedCount / total) * 100);

        document.getElementById('totalTasks').innerText = total;
        document.getElementById('highPriorityCount').innerText = highCount;
        document.getElementById('overdueCount').innerText = overdueCount;
        document.getElementById('completionBar').style.width = progress + "%";
        document.getElementById('completionText').innerText = progress + "%";
    }

    // 2. 从服务器获取并刷新列表
    async function refreshTaskList() {
        try {
            const res = await fetch(`http://localhost:8080/get_tasks?username=${username}`);
            currentTasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = ""; 
            currentTasks.forEach(t => renderTask(t.task_name, t.task_time, t.priority));
            updateAllCountdowns();
            updateDashboard(); // 刷新后更新看板
        } catch (e) {
            console.error("无法连接到后端服务器");
        }
    }

    // 3. 渲染单条任务卡片
    function renderTask(name, time, priority) {
        const list = document.getElementById('taskList');
        const card = document.createElement('div');
        const pMap = { high: '高', medium: '中', low: '低' };
        
        card.className = `task-card task-${priority}`;
        card.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px;">
                <input type="checkbox" class="finish-check" onclick="toggleComplete(this)">
                <div class="task-info">
                    <h4>${name}</h4>
                    <div class="task-time">截止日期：${time.replace('T', ' ')}</div>
                    <div class="task-countdown" data-time="${time}">计算中...</div>
                </div>
            </div>
            <div class="task-right">
                <div class="task-priority priority-${priority}">${pMap[priority]}优先级</div>
                <button class="btn-delete" onclick="deleteTask('${name}', '${time}')">删除</button>
            </div>
        `;
        list.appendChild(card);
    }

    // 4. 添加任务
    async function addTask() {
        const name = document.getElementById('taskInput').value;
        const time = document.getElementById('timeInput').value;
        const priority = document.getElementById('prioritySelect').value;

        if (!name || !time || !priority) { alert('请填写完整信息'); return; }

        try {
            const res = await fetch('http://localhost:8080/add_task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, task_name: name, task_time: time, priority })
            });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('taskForm').reset();
                refreshTaskList();
            }
        } catch (e) { alert("服务器连接失败"); }
    }

    // 5. 删除任务
    async function deleteTask(name, time) {
        if (!confirm("确定要删除这项事务吗？")) return;

        try {
            const res = await fetch('http://localhost:8080/delete_task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, task_name: name, task_time: time })
            });
            const data = await res.json();
            if (data.status === "success") refreshTaskList();
        } catch (e) { alert("删除失败，请检查网络"); }
    }

    // 6. 核心倒计时逻辑
    function updateAllCountdowns() {
        const now = new Date();
        document.querySelectorAll('.task-countdown').forEach(el => {
            const target = new Date(el.getAttribute('data-time'));
            const diff = target - now;

            if (diff <= 0) {
                el.innerText = "⚠️ 事务已逾期";
                el.classList.add('overdue');
            } else {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                el.innerText = `剩余：${d > 0 ? d + '天 ' : ''}${h}小时 ${m}分`;
                el.classList.remove('overdue');
            }
        });
        updateDashboard(); // 倒计时更新时顺便刷新看板（处理逾期数）
    }

    // 7. 视觉勾选完成
    function toggleComplete(checkbox) {
        const card = checkbox.closest('.task-card');
        checkbox.checked ? card.classList.add('completed') : card.classList.remove('completed');
        updateDashboard(); // 勾选时更新进度条
    }

    function logout() {
        sessionStorage.removeItem("isLogin");
        alert("已退出登录");
        location.href = "login.html";
    }
</script>
</body>
</html>
