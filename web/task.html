<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
// 只判断会话登录，刷新就失效
if (sessionStorage.getItem("isLogin") !== "true") {
    alert("请先登录后再访问该页面！");
    location.href = "new.html";
}
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事务日程管理 - 学生事务时间管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* ✅ 全局背景图（柔和、不刺眼、不挡文字） */
        body {
            background: url('images/task.jpeg') center top / cover no-repeat fixed;
            background-color: #f5f7fa;
        }

        /* 统一导航栏 */
        .nav-bar {
            width: 100%;
            height: 70px;
            background-color: #165DFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }
        .nav-bar .logo {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
        }
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            margin: 0 12px;
            padding: 8px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .nav-menu a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-menu a.active {
            background: rgba(255,255,255,0.25);
        }

        /* 主内容区（加了半透明白底，让文字更清晰） */
        .wrap {
            margin-top: 120px;
            width: 1000px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .page-title {
            font-size: 26px;
            color: #333;
            margin-bottom: 30px;
            padding-left: 10px;
            border-left: 5px solid #165DFF;
        }

        /* 新增任务区域 */
        .add-task {
            background: #fff;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }
        .add-task h3 {
            color: #165DFF;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .task-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .task-form input, .task-form select {
            padding: 14px;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            font-size: 15px;
            outline-color: #165DFF;
        }
        .task-form input[type="text"] {
            flex: 1;
            min-width: 300px;
        }
        .task-form input[type="datetime-local"] {
            width: 220px;
        }
        .task-form select {
            width: 150px;
        }
        .task-form button {
            padding: 14px 30px;
            background: #165DFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .task-form button:hover {
            background: #0b4cde;
        }

        /* 任务列表区域 */
        .task-list {
            margin-top: 30px;
        }
        .task-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            transition: transform 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-card:hover {
            transform: translateY(-3px);
        }
        .task-high {
            border-left: 5px solid #f53f3f;
            background: #fff2f0;
        }
        .task-medium {
            border-left: 5px solid #ff9800;
            background: #fff7e6;
        }
        .task-low {
            border-left: 5px solid #34a853;
            background: #f6ffed;
        }
        .task-info h4 {
            color: #333;
            margin-bottom: 5px;
        }
        .task-info .task-time {
            color: #999;
            font-size: 13px;
        }
        .task-priority {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
        }
        .priority-high {
            background: #f53f3f;
        }
        .priority-medium {
            background: #ff9800;
        }
        .priority-low {
            background: #34a853;
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="logo">学生事务时间管理系统</div>
    <div class="nav-menu">
        <a href="new.html">首页</a>
        <a href="task.html" class="active">事务日程管理</a>
        <a href="study.html">学习规划安排</a>
        <a href="help.html">使用帮助</a>
        <a href="login.html">登录</a>
        <a href="register.html">注册</a>
        <a href="javascript:logout()" style="color:#ff4444; font-weight:bold;">退出登录</a>
    </div>
</div>

<div class="wrap">
    <h2 class="page-title">我的事务日程管理</h2>

    <div class="add-task">
        <h3>添加新事务</h3>
        <form class="task-form">
            <input type="text" placeholder="请输入事务内容（如：完成前端作业）" required>
            <input type="datetime-local" required>
            <select required>
                <option value="">选择优先级</option>
                <option value="high">高优先级</a>
                <option value="medium">中优先级</option>
                <option value="low">低优先级</option>
            </select>
            <button type="button" onclick="addTask()">添加事务</button>
        </form>
    </div>

    <div class="task-list" id="taskList">
        <div class="task-card task-high">
            <div class="task-info">
                <h4>完成task.html页面开发</h4>
                <div class="task-time">2025-05-07 18:00</div>
            </div>
            <div class="task-priority priority-high">高优先级</div>
        </div>
        <div class="task-card task-medium">
            <div class="task-info">
                <h4>查看公告资讯中心内容</h4>
                <div class="task-time">2025-05-08 10:00</div>
            </div>
            <div class="task-priority priority-medium">中优先级</div>
        </div>
    </div>
</div>

<script>
    function addTask() {
        const taskInput = document.querySelector('.task-form input[type="text"]');
        const timeInput = document.querySelector('.task-form input[type="datetime-local"]');
        const prioritySelect = document.querySelector('.task-form select');
        
        if (!taskInput.value || !timeInput.value || !prioritySelect.value) {
            alert('请填写完整事务信息和优先级！');
            return;
        }

        const time = new Date(timeInput.value);
        const formatTime = `${time.getFullYear()}-${(time.getMonth()+1).toString().padStart(2,'0')}-${time.getDate().toString().padStart(2,'0')} ${time.getHours().toString().padStart(2,'0')}:${time.getMinutes().toString().padStart(2,'0')}`;

        let taskCard, priorityText, priorityClass;
        if (prioritySelect.value === 'high') {
            taskCard = document.createElement('div');
            taskCard.className = 'task-card task-high';
            priorityText = '高优先级';
            priorityClass = 'priority-high';
        } else if (prioritySelect.value === 'medium') {
            taskCard = document.createElement('div');
            taskCard.className = 'task-card task-medium';
            priorityText = '中优先级';
            priorityClass = 'priority-medium';
        } else {
            taskCard = document.createElement('div');
            taskCard.className = 'task-card task-low';
            priorityText = '低优先级';
            priorityClass = 'priority-low';
        }

        taskCard.innerHTML = `
            <div class="task-info">
                <h4>${taskInput.value}</h4>
                <div class="task-time">${formatTime}</div>
            </div>
            <div class="task-priority ${priorityClass}">${priorityText}</div>
        `;

        document.getElementById('taskList').insertBefore(taskCard, document.getElementById('taskList').firstChild);

        taskInput.value = '';
        timeInput.value = '';
        prioritySelect.value = '';
    }
</script>
<script>
// 退出登录 —— 清理所有登录状态
function logout() {
    // 清空登录状态（你现在用的是 sessionStorage）
    sessionStorage.removeItem("isLogin");
    
    // 跳回登录页
    alert("已退出登录，请重新登录！");
    location.href = "login.html";
}
</script>
</body>
</html>
