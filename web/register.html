<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 学生事务时间管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 全屏背景图 和登录页共用一张 */
        body {
            background: url('images/register.jpeg') center center / cover no-repeat;
            background-attachment: fixed;
        }

        /* 顶部导航栏 */
        .nav-bar {
            width: 100%;
            height: 70px;
            background-color: #165DFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }
        .nav-bar .logo {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
        }
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            margin: 0 12px;
            padding: 8px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .nav-menu a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-menu a.active {
            background: rgba(255,255,255,0.25);
        }

        /* 注册容器垂直水平居中 */
        .reg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-top: 70px;
        }

        .reg-box {
            width: 460px;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .reg-box h2 {
            text-align: center;
            color: #165DFF;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .reg-box input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            font-size: 15px;
            outline-color: #165DFF;
        }
        .reg-box button {
            width: 100%;
            padding: 14px;
            background: #165DFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .reg-box button:hover {
            background: #0b4cde;
        }
        .tip {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .tip a {
            color: #165DFF;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- 已全部修好！所有导航都能正常跳转！-->
<div class="nav-bar">
    <div class="logo">学生事务时间管理系统</div>
    <div class="nav-menu">
        <a href="new.html">首页</a>
        <a href="task.html">事务日程管理</a>
        <a href="study.html">学习规划安排</a>
        <a href="help.html">使用帮助</a>
        <a href="login.html">登录</a>
        <a href="register.html" class="active">注册</a>
    </div>
</div>

<div class="reg-container">
    <div class="reg-box">
        <h2>账号注册</h2>
        <input type="text" placeholder="请输入学号">
        <input type="text" placeholder="请输入姓名">
        <input type="password" placeholder="设置登录密码">
        <input type="password" placeholder="确认密码">
        <button onclick="alert('注册成功！'); location.href='login.html'">立即注册</button>
        <div class="tip">已有账号？<a href="login.html">去登录</a></div>
    </div>
</div>

</body>
</html>
